<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- רקע: ריבוע מעוגל בצבע navy (theme primary). מציאה שלמה עד הקצוות
       כדי לתמוך ב-maskable icons (המערכת תחתוך למסכה משלה, למשל עיגול). -->
  <rect width="512" height="512" rx="96" fill="#14274E" />
  <!-- גליף ש"ח בזהב (theme accent), ממורכז בתוך safe zone כ-80% (רדיוס כ-204px
       סביב המרכז 256,256) כדי שלא ייחתך במסכות maskable שונות. -->
  <g fill="#C9A24B">
    <!-- קו אנכי שמאלי -->
    <rect x="176" y="146" width="46" height="220" rx="8" />
    <!-- קו אנכי ימני, קצר יותר ויורד עם "רגל" בסגנון סימן השקל -->
    <path d="M 290 146 h 46 v 174 a 46 46 0 0 1 -46 46 h -46 v -46 h 30 a 16 16 0 0 0 16 -16 z" />
  </g>
</svg>
