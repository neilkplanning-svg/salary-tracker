<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב שכר</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#14274E">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="src/ui/theme.css" />
  <script type="module" src="src/ui/app.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>מעקב שכר</h1>
      <div class="header-actions">
        <span id="header-sync-status" class="header-sync-status" role="status" aria-live="polite"></span>
        <button id="header-sync-open" type="button" class="header-sync-btn" aria-label="פתח קובץ OneDrive" title="פתח קובץ OneDrive">
          <span aria-hidden="true">📂</span><span class="header-sync-label">פתח</span>
        </button>
        <button id="header-sync-save" type="button" class="header-sync-btn" aria-label="שמור קובץ OneDrive" title="שמור קובץ OneDrive">
          <span aria-hidden="true">💾</span><span class="header-sync-label">שמור</span>
        </button>
        <button id="theme-toggle" aria-label="החלף ערכת נושא">🌙</button>
      </div>
    </header>
    <nav id="main-nav">
      <a href="#attendance">נוכחות</a>
      <a href="#estimate">משוער</a>
      <a href="#actual">בפועל</a>
      <a href="#reductions">הפחתות</a>
      <a href="#aidfund">קרן עזרה</a>
      <a href="#dollarfund">קרן דולרית</a>
      <a href="#history">היסטוריה</a>
      <a href="#settings">הגדרות</a>
    </nav>
    <main id="screen-container">
      <div class="placeholder-notice">
        <p>האפליקציה בבנייה</p>
        <p style="font-size:0.85em;opacity:0.7;">WP0.1 — Scaffolding</p>
      </div>
    </main>
  </div>
</body>
</html>
